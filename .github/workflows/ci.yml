name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    strategy:
      matrix:
        go-version: ["1.24"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - run: go mod download
      - run: go test -v -count=1 ./...

  test-race:
    strategy:
      matrix:
        go-version: ["1.24"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - run: go mod download
      - run: go test -v -race -count=1 ./...

  lint:
    strategy:
      matrix:
        go-version: ["1.24"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - run: go mod download
      - name: Install tooling
        run: make tooling
      - run: make lint
      - run: make vuln-check

  fmt:
    strategy:
      matrix:
        go-version: ["1.24"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - run: go mod download
      - name: Install tooling
        run: make tooling
      - run: make fmt
      - run: make has-changes
