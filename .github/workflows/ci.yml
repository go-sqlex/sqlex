name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    strategy:
      matrix:
        go-version: ["1.21", "1.26"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - run: go mod download

      # Run tests with coverage + race detection.
      # SQLite uses :memory: by default (no SQLX_SQLITE_DSN set).
      # MySQL/PostgreSQL/SQL Server require external services, so skipped in CI.
      - name: Run tests with coverage
        run: |
          SQLX_MYSQL_DSN=skip \
          SQLX_POSTGRES_DSN=skip \
          SQLX_SQLSERVER_DSN=skip \
          go test -v -count=1 -race \
            -coverprofile=coverage.out -covermode=atomic \
            -coverpkg=github.com/go-sqlex/sqlex,github.com/go-sqlex/sqlex/types,github.com/go-sqlex/sqlex/reflectx \
            ./...

      # Upload coverage to Codecov (only on the latest Go version to avoid duplicates)
      - name: Upload coverage to Codecov
        if: matrix.go-version == '1.26'
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: make tooling
      - run: make check
      - run: make vuln-check